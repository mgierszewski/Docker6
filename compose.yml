version: '3.9'

services:
  nginx:
    build: ./Frontend
    ports:
      - "80:80"
    networks:
      - front-net
      - back-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: ./Backend
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - APP_PORT=${APP_PORT}
      - REDIS_HOST=cache
      - REDIS_PORT=6379
    networks:
      - back-net
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${APP_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - back-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    networks:
      - back-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-seed:
    image: postgres:16-alpine
    profiles:
      - tools
    networks:
      - back-net
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
    command: >
      psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} \
        -c "INSERT INTO products (name, price) VALUES ('Widget', 9.99), ('Gadget', 24.99), ('Doohickey', 4.49)"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg-data:

networks:
  front-net:
    driver: bridge
  back-net:
    driver: bridge
